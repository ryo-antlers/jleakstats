name: Fantasy Auto Process

on:
  schedule:
    # 毎時0分に実行（UTC）= JST 毎時9分
    - cron: '0 * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  auto-process:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-process
        run: |
          curl -s -f \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/fantasy/auto-process" | jq .
